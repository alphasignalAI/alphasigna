<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSigna V18.5 - Omni Network Matrix</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #06090e;
            --card-bg: #0d1117;
            --accent: #ff007f;
            --long: #00e676;
            --short: #ff1744;
            --border: #21262d;
        }
        body {
            background-color: var(--bg-dark); color: #c9d1d9; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px;
            overflow-x: hidden;
        }
        
        /* 🚨 System Status Bar */
        #status-bar {
            background: rgba(0, 255, 204, 0.1); border: 1px solid var(--primary);
            color: var(--primary); text-align: center; padding: 10px; border-radius: 8px;
            font-size: 13px; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .pulse-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* 🔑 Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 320px; }
        .login-box input { padding: 14px; width: 85%; border-radius: 8px; border: 1px solid var(--border); background: #010409; color: var(--primary); font-size: 16px; text-transform: uppercase; text-align: center; margin-bottom: 20px; outline: none; }
        
        /* Buttons */
        .btn { background: var(--primary); color: #000; padding: 14px 28px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
        .btn:hover { box-shadow: 0 0 20px var(--primary); transform: translateY(-1px); }
        
        .btn-trade { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; padding: 11px; width: 48%; display: inline-block; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-trade:hover { background: var(--primary); color: #000; }
        
        .btn-chart { background: rgba(255, 0, 127, 0.05); border: 1px solid var(--accent); color: var(--accent); margin-top: 15px; padding: 11px; width: 48%; display: inline-block; float: right; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-chart:hover { background: var(--accent); color: #fff; box-shadow: 0 0 15px var(--accent); }

        /* Dashboard Setup */
        #dashboard { display: none; max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #fff; margin-bottom: 5px; font-size: 28px; font-weight: 800; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 26px; font-weight: 700; color: #f0f6fc; }
        .global-card { border-left: 4px solid var(--primary); }
        .personal-card { border-left: 4px solid var(--accent); }

        /* 🌳 OMNI-DIRECTIONAL 360 CANVAS FIELD */
        .scanner-section { text-align: center; margin: 20px 0; position: relative; }
        #canvas-container { display: none; width: 100%; height: 550px; margin: 0 auto 20px auto; background: #010409; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        #scanner-status { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; font-family: monospace; font-size: 13px; color: var(--primary); font-weight: bold; letter-spacing: 1px; z-index: 5; }

        /* Signals Card Grid */
        .signal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 20px; opacity: 0; transition: opacity 0.5s ease; margin-top: 20px; }
        .signal-card { background: var(--card-bg); border-radius: 14px; padding: 24px; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
        .badge-swing { background: rgba(56, 139, 253, 0.15); color: #58a6ff; border: 1px solid rgba(56, 139, 253, 0.4); }
        .badge-scalp { background: rgba(242, 8c, 166, 0.15); color: #f25ca6; border: 1px solid rgba(242, 8c, 166, 0.4); }
        
        .coin-title { font-size: 24px; font-weight: 700; margin-bottom: 18px; display: flex; justify-content: space-between; color: #fff; }
        .side-long { color: var(--long); }
        .side-short { color: var(--short); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid rgba(33,38,45,0.5); padding-bottom: 6px; }
        .data-label { color: #8b949e; }
        .data-value { font-weight: 600; color: #f0f6fc; }
        
        .fomo-bar { font-size: 12px; color: var(--primary); background: rgba(0,255,204,0.05); padding: 6px 12px; border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        /* 📈 Live Chart Popup */
        #chart-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(1, 4, 9, 0.96); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        .chart-container { width: 92%; max-width: 1050px; height: 75vh; background: #010409; border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; }
        .close-chart { position: absolute; top: 15px; right: 20px; color: #8b949e; font-size: 26px; cursor: pointer; background: none; border: none; }
        #tv-chart { width: 100%; height: calc(100% - 40px); margin-top: 15px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <div id="status-bar" style="display: none;">
        <div class="pulse-dot" id="status-dot"></div>
        <span id="status-text">HF ENGINE CORE: LOADING...</span>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #fff; margin-bottom: 5px; font-weight: 800;">ALPHASIGNA AI</h2>
            <p style="color: #8b949e; font-size: 13px; margin-bottom: 25px;">Global High-Frequency Terminal</p>
            <input type="password" id="access-key" placeholder="ENTER LICENSE KEY" />
            <br>
            <button class="btn" onclick="verifyFirebaseKey()">INITIALIZE MATRIX</button>
            <p id="error-msg" style="color: var(--short); display: none; margin-top: 15px; font-weight: 600;">⚠️ ACCESS DENIED</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>AlphaSigna Intelligence Hub</h1>
            <p id="user-welcome" style="color: var(--primary); font-size: 13px; font-weight: 700; margin: 0;"></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card global-card"><h3>Global Total Trades</h3><div class="stat-value" id="global-total-trades">0</div></div>
            <div class="stat-card global-card"><h3>Global Win Rate</h3><div class="stat-value" id="global-win-rate" style="color: var(--primary);">0%</div></div>
            <div class="stat-card personal-card"><h3>My Matrix Trades</h3><div class="stat-value" id="user-trades">0</div></div>
            <div class="stat-card personal-card"><h3>My Target Performance</h3><div class="stat-value" id="user-pnl-ratio" style="color: var(--long);">0 / 0</div></div>
        </div>

        <div class="scanner-section">
            <div id="canvas-container">
                <canvas id="treeCanvas"></canvas>
                <div id="scanner-status">CONNECTING TO HIGH-FREQUENCY PIPELINE...</div>
            </div>
            <button class="btn" id="scan-btn" style="width: auto; padding: 12px 30px;" onclick="startAdvancedScan()">🛰️ SCAN REAL-TIME ORDERBOOK</button>
        </div>

        <div class="signal-grid" id="signal-container"></div>
    </div>

    <div id="chart-modal">
        <div class="chart-container">
            <button class="close-chart" onclick="closeLiveChart()">✖</button>
            <div class="chart-header">
                <span class="chart-title" id="chart-coin-name">BTC/USDT</span>
                <span id="chart-side" class="badge"></span>
            </div>
            <div id="tv-chart"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://alphasigna-live-d644a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentSignalData = null;
        let activeUserKey = null;

        // Interactive Matrix Canvas Variables
        let canvas, ctx, animationFrameId;
        let treeNodes = [], treeEdges = [], marketFruits = [];
        let scanComplete = false;

        // Extended list of Binance assets to generate a massive omni-directional layout grid look
        const mainBinanceCoins = [
            {name: "BTC", trend: "BUY"}, {name: "ETH", trend: "BUY"}, {name: "SOL", trend: "BUY"}, 
            {name: "BNB", trend: "SELL"}, {name: "XRP", trend: "SELL"}, {name: "ADA", trend: "BUY"},
            {name: "AVAX", trend: "BUY"}, {name: "DOT", trend: "SELL"}, {name: "DOGE", trend: "BUY"}, 
            {name: "LINK", trend: "BUY"}, {name: "NEAR", trend: "SELL"}, {name: "MATIC", trend: "BUY"},
            {name: "SUI", trend: "BUY"}, {name: "APT", trend: "SELL"}, {name: "FET", trend: "BUY"}, 
            {name: "TAO", trend: "BUY"}, {name: "RNDR", trend: "SELL"}, {name: "FIL", trend: "SELL"}, 
            {name: "LTC", trend: "BUY"}, {name: "ATOM", trend: "SELL"}, {name: "INJ", trend: "BUY"},
            {name: "TIA", trend: "BUY"}, {name: "OP", trend: "SELL"}, {name: "ARB", trend: "SELL"},
            {name: "FTM", trend: "BUY"}, {name: "ICP", trend: "BUY"}, {name: "PEPE", trend: "BUY"}
        ];

        db.ref('system_status').on('value', (snapshot) => {
            const status = snapshot.val();
            const statusBar = document.getElementById('status-bar');
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            if(status) {
                statusBar.style.display = 'flex';
                statusText.innerText = `SYSTEM STATUS: ${status.message.toUpperCase()}`;
                if(status.is_paused === true || status.is_paused === "true") {
                    statusBar.style.border = '1px solid #ff1744'; statusBar.style.color = '#ff1744';
                    statusDot.style.background = '#ff1744'; statusDot.style.boxShadow = '0 0 8px #ff1744';
                } else {
                    statusBar.style.border = '1px solid #00ffcc'; statusBar.style.color = '#00ffcc';
                    statusDot.style.background = '#00ffcc'; statusDot.style.boxShadow = '0 0 8px #00ffcc';
                }
            }
        });

        function verifyFirebaseKey() {
            const inputKey = document.getElementById('access-key').value.trim();
            if(!inputKey) return;
            db.ref('premium_keys/' + inputKey).once('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData && userData.status === "active") {
                    activeUserKey = inputKey;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('user-welcome').innerText = `LICENSE USER: ${inputKey.toUpperCase()} (EXPIRES: ${userData.expire_date})`;
                    initCoreListeners();
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }

        function initCoreListeners() {
            db.ref('live_signals').on('value', (s) => { currentSignalData = s.val(); if(document.getElementById('signal-container').style.opacity === "1") renderSignals(currentSignalData); });
            db.ref('global_stats').on('value', (s) => {
                const d = s.val(); if(d) {
                    document.getElementById('global-total-trades').innerText = d.total_trades || 0;
                    document.getElementById('global-win-rate').innerText = d.total_tp + d.total_sl > 0 ? ((d.total_tp / (d.total_tp + d.total_sl)) * 100).toFixed(1) + '%' : '0%';
                }
            });
            db.ref('premium_keys/' + activeUserKey + '/stats').on('value', (s) => {
                const d = s.val(); if(d) {
                    document.getElementById('user-trades').innerText = d.trades || 0;
                    document.getElementById('user-pnl-ratio').innerText = `${d.tp || 0} TP / ${d.sl || 0} SL`;
                }
            });
        }

        function takeTrade(coin) {
            db.ref('global_stats/total_trades').transaction(v => (v || 0) + 1);
            db.ref('premium_keys/' + activeUserKey + '/stats/trades').transaction(v => (v || 0) + 1);
            alert(`⚡ TRADE COMMAND INTEGRATED for ${coin}.`);
        }

        // --- 🌳 ADVANCED 5-SECOND OMNI-DIRECTIONAL 360° ENGINE ---
        function startAdvancedScan() {
            const btn = document.getElementById('scan-btn');
            const container = document.getElementById('canvas-container');
            const grid = document.getElementById('signal-container');
            const statusText = document.getElementById('scanner-status');

            btn.style.display = 'none';
            container.style.display = 'block';
            grid.style.opacity = '0';
            scanComplete = false;

            canvas = document.getElementById('treeCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            treeNodes = []; treeEdges = []; marketFruits = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Anchor Core Node completely in the center to grow outward symmetrically
            treeNodes.push({ id: 0, x: centerX, y: centerY, currentX: centerX, currentY: centerY, level: 0 });
            
            let idCounter = 1;
            
            // Generate a 360-degree radical network matrix spreading evenly to all sides
            function growOmniNetwork(parentId, startX, startY, baseAngle, level) {
                if (level > 3) return;
                
                // Branches count depends on position level for optimal spacing grid
                const branchesCount = level === 1 ? 6 : 2; 
                const spread = level === 1 ? (Math.PI * 2) / branchesCount : 0.8; 

                for (let i = 0; i < branchesCount; i++) {
                    let angle = level === 1 ? baseAngle + (i * spread) : baseAngle + (i === 0 ? -spread/2 : spread/2);
                    let length = 110 / level; // Adaptive length balancing node maps
                    
                    const endX = startX + Math.cos(angle) * length;
                    const endY = startY + Math.sin(angle) * length;
                    const currentId = idCounter++;
                    
                    treeNodes.push({ id: currentId, x: endX, y: endY, level: level });
                    treeEdges.push({ from: parentId, to: currentId });

                    if (level === 3 && marketFruits.length < mainBinanceCoins.length) {
                        const dynamicCoin = mainBinanceCoins[marketFruits.length];
                        marketFruits.push({
                            x: endX, y: endY, baseRatio: 0,
                            targetRadius: Math.floor(Math.random() * 5) + 20,
                            name: dynamicCoin.name,
                            trend: dynamicCoin.trend,
                            vx: (Math.random() * 0.4 - 0.2),
                            vy: (Math.random() * 0.4 - 0.2)
                        });
                    }

                    growOmniNetwork(currentId, endX, endY, angle, level + 1);
                }
            }
            
            // Fire layout seeds from center outward to cover 360 degrees layout
            growOmniNetwork(0, centerX, centerY, 0, 1);

            let startTime = Date.now();

            function updateGraphicsPipeline() {
                let elapsed = Date.now() - startTime;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // --- PHASE 1: Omni Extension Expanding (0 to 2.5 seconds) ---
                if (elapsed <= 2500) {
                    statusText.innerText = `🛰️ ASSEMBLING 360° OMNI-MATRIX INTERFACE [MAPPING ALL BINANCE ASSETS...]`;
                    let growthFactor = elapsed / 2500;
                    
                    ctx.strokeStyle = "rgba(0, 255, 204, 0.25)";
                    ctx.lineWidth = 1.2;
                    treeEdges.forEach(edge => {
                        const fromNode = treeNodes.find(n => n.id === edge.from);
                        const toNode = treeNodes.find(n => n.id === edge.to);
                        
                        let currentX = fromNode.x + (toNode.x - fromNode.x) * growthFactor;
                        let currentY = fromNode.y + (toNode.y - fromNode.y) * growthFactor;
                        
                        ctx.beginPath(); ctx.moveTo(fromNode.x, fromNode.y); ctx.lineTo(currentX, currentY); ctx.stroke();
                    });

                    treeNodes.forEach(node => {
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath(); ctx.arc(node.x, node.y, 2, 0, Math.PI * 2); ctx.fill();
                    });
                } 
                // --- PHASE 2 & 3: Asset Fruit Blooms & Permanent Floating Waves (2.5 Seconds Onwards) ---
                else {
                    statusText.innerText = `🟢 GLOBAL COIN MESH STABILIZED [PAST 20M BUY/SELL TRENDS ENCODED]`;
                    
                    if (!scanComplete) {
                        if (elapsed >= 5000) {
                            scanComplete = true;
                            renderSignals(currentSignalData);
                            grid.style.opacity = '1';
                        }
                    }

                    let fruitFactor = Math.min((elapsed - 2500) / 2500, 1);

                    // Add shifting physics to outer floating bubble pods
                    marketFruits.forEach(fruit => {
                        fruit.x += fruit.vx; fruit.y += fruit.vy;
                        if (fruit.x < 30 || fruit.x > canvas.width - 30) fruit.vx *= -1;
                        if (fruit.y < 30 || fruit.y > canvas.height - 30) fruit.vy *= -1;
                    });

                    // Update grid structure nodes lines
                    ctx.strokeStyle = "rgba(33, 38, 45, 0.5)";
                    ctx.lineWidth = 1.2;
                    treeEdges.forEach(edge => {
                        const fromNode = treeNodes.find(n => n.id === edge.from);
                        const toNode = treeNodes.find(n => n.id === edge.to);
                        ctx.beginPath(); ctx.moveTo(fromNode.x, fromNode.y); ctx.lineTo(toNode.x, toNode.y); ctx.stroke();
                    });

                    // Draw permanent bubbles വട്ടේටම (Green for Buy / Red for Sell)
                    marketFruits.forEach(fruit => {
                        fruit.baseRatio = fruit.targetRadius * fruitFactor;

                        if (fruit.trend === "BUY") {
                            ctx.strokeStyle = `rgba(0, 230, 118, 0.75)`; 
                            ctx.fillStyle = "rgba(12, 42, 27, 0.95)";
                        } else {
                            ctx.strokeStyle = `rgba(255, 23, 68, 0.75)`; 
                            ctx.fillStyle = "rgba(44, 13, 20, 0.95)";
                        }
                        
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(fruit.x, fruit.y, fruit.baseRatio, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();

                        if (fruit.baseRatio > 14) {
                            ctx.fillStyle = "#ffffff";
                            ctx.font = "bold 10px monospace";
                            ctx.textAlign = "center";
                            ctx.fillText(fruit.name, fruit.x, fruit.y - 3);

                            ctx.fillStyle = fruit.trend === "BUY" ? "var(--long)" : "var(--short)";
                            ctx.font = "7px monospace";
                            ctx.fillText(fruit.trend, fruit.x, fruit.y + 7);
                        }
                    });
                }

                animationFrameId = requestAnimationFrame(updateGraphicsPipeline);
            }
            updateGraphicsPipeline();
        }

        function renderSignals(data) {
            const container = document.getElementById('signal-container');
            container.innerHTML = ''; if (!data) return;

            if (data.WAITING) {
                container.innerHTML = `
                    <div class="signal-card" style="text-align: center; grid-column: 1 / -1; padding: 50px; border: 1px dashed #00ffcc; background: rgba(0,255,204,0.02);">
                        <span class="badge badge-swing" style="background:transparent; border-color:#00ffcc; color:#00ffcc;">COMPILING ENGINE ⏳</span>
                        <h2 style="color: #fff; font-weight:700;">Scanning Global High-Frequency Liquidity...</h2>
                    </div>`;
                return;
            }

            const currentTime = Math.floor(Date.now() / 1000);
            for (const [coin, details] of Object.entries(data)) {
                if (details.signal_type.includes("SCALP") && (currentTime - details.timestamp) > 900) continue; 
                let badgeClass = details.signal_type.includes("SWING") ? "badge-swing" : "badge-scalp";
                let sideClass = details.side === "LONG" ? "side-long" : "side-short";
                const chartArgs = `'${details.pair}', ${details.entry}, ${details.tp1}, ${details.sl}, '${details.side}'`;
                const simulatedTraders = Math.floor(Math.random() * (85 - 30 + 1)) + 30;

                container.innerHTML += `
                    <div class="signal-card">
                        <div>
                            <span class="badge ${badgeClass}">${details.signal_type}</span>
                            <div class="coin-title"><span>${details.pair}</span><span class="${sideClass}">${details.side}</span></div>
                            <div class="data-row"><span class="data-label">AI Target Entry</span><span class="data-value">${details.entry}</span></div>
                            <div class="data-row"><span class="data-label">Take Profit 01</span><span class="data-value" style="color: #00e676;">${details.tp1}</span></div>
                            <div class="data-row"><span class="data-label">Stop Target Loss</span><span class="data-value" style="color: #ff1744;">${details.sl}</span></div>
                            <div class="data-row"><span class="data-label">AI Matrix Confidence</span><span class="data-value" style="color: #00ffcc;">${details.accuracy}%</span></div>
                        </div>
                        <div>
                            <div class="fomo-bar">🔥 <span>${simulatedTraders}</span> Global Traders executed this setup</div>
                            <button class="btn btn-trade" onclick="takeTrade('${coin}')">⚡ TAKE TRADE</button>
                            <button class="btn btn-chart" onclick="openLiveChart(${chartArgs})">📊 LIVE CHART</button>
                        </div>
                    </div>`;
            }
        }

        function openLiveChart(pair, entry, tp, sl, side) {
            document.getElementById('chart-modal').style.display = 'flex';
            document.getElementById('chart-coin-name').innerText = `${pair} Real-Time Terminal`;
            const sideBadge = document.getElementById('chart-side');
            sideBadge.innerText = side; sideBadge.className = side === 'LONG' ? 'badge badge-swing' : 'badge badge-scalp';

            const chartDiv = document.getElementById('tv-chart');
            chartDiv.innerHTML = '';
            const tvSymbol = "BINANCE:" + pair.replace('/', '');

            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": tvSymbol, "interval": "1",
                "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en",
                "toolbar_bg": "#010409", "enable_publishing": false, "hide_side_toolbar": true,
                "allow_symbol_change": false, "container_id": "tv-chart", "studies": [],
                "backgroundColor": "#010409", "gridColor": "rgba(33, 38, 45, 0.4)"
            });
        }

        function closeLiveChart() {
            document.getElementById('chart-modal').style.display = 'none';
            document.getElementById('tv-chart').innerHTML = '';
        }
    </script>
</body>
</html>
