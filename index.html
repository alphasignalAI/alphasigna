<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSigna V17.1 - Live AI Signals</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .signal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .signal-card {
            background: #151a22;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a3142;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .signal-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .badge-swing { background: #0d47a1; color: #64b5f6; border: 1px solid #1976d2; }
        .badge-scalp { background: #ff6f00; color: #ffe082; border: 1px solid #ffa000; }
        .badge-waiting { background: #424242; color: #bdbdbd; border: 1px solid #616161; }
        
        .coin-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .side-long { color: #00e676; }
        .side-short { color: #ff1744; }
        .side-neutral { color: #9e9e9e; }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #2a3142;
            padding-bottom: 5px;
        }
        .data-label { color: #8b94a3; }
        .data-value { font-weight: bold; }
        
        .ai-logic {
            margin-top: 15px;
            font-size: 12px;
            color: #78909c;
            background: #1a232e;
            padding: 10px;
            border-radius: 6px;
        }
        .timestamp {
            font-size: 11px;
            color: #546e7a;
            text-align: right;
            margin-top: 10px;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="header">
        <h1>💎 AlphaSigna Live Hub</h1>
        <p>Advanced Dual-Engine AI Matrix (Swing & Scalp)</p>
    </div>

    <div class="signal-grid" id="signal-container">
        </div>

    <script>
        // 🚨 මෙතනට ඔයාගේ Firebase Config එක දාන්න 🚨
        const firebaseConfig = {
            databaseURL: "https://alphasigna-live-d644a-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function renderSignals(data) {
            const container = document.getElementById('signal-container');
            container.innerHTML = ''; // පරණ දත්ත මකන්න

            if (!data) return;

            const currentTime = Math.floor(Date.now() / 1000);

            for (const [coin, details] of Object.entries(data)) {
                
                // 1. Waiting State එක පරීක්ෂා කිරීම
                if (coin === "WAITING" || details.signal_type === "WAITING ⏳") {
                    const card = `
                        <div class="signal-card" style="text-align: center; grid-column: 1 / -1; padding: 50px;">
                            <span class="badge badge-waiting">${details.signal_type}</span>
                            <h2 class="side-neutral">Analyzing Live Market Data...</h2>
                            <p style="color: #8b94a3;">${details.tech_logic}</p>
                        </div>
                    `;
                    container.innerHTML += card;
                    return; // වෙන කාසි නැති නිසා නවත්වනවා
                }

                // 2. Scalp Auto-Expiration (විනාඩි 15 ට වඩා පරණ නම් මකා දැමේ)
                if (details.signal_type.includes("SCALP")) {
                    const signalAge = currentTime - details.timestamp;
                    if (signalAge > 900) { // තත්පර 900 = විනාඩි 15
                        continue; // මේ කාසිය UI එකට දාන්නේ නැහැ (Skip)
                    }
                }

                // 3. Signal Card එක නිර්මාණය කිරීම
                let badgeClass = details.signal_type.includes("SWING") ? "badge-swing" : "badge-scalp";
                let sideClass = details.side === "LONG" ? "side-long" : "side-short";

                const cardHTML = `
                    <div class="signal-card">
                        <span class="badge ${badgeClass}">${details.signal_type}</span>
                        <div class="coin-title">
                            <span>${details.pair}</span>
                            <span class="${sideClass}">${details.side}</span>
                        </div>
                        
                        <div class="data-row">
                            <span class="data-label">Entry Price</span>
                            <span class="data-value">${details.entry}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Take Profit (TP)</span>
                            <span class="data-value" style="color: #00e676;">${details.tp1}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Stop Loss (SL)</span>
                            <span class="data-value" style="color: #ff1744;">${details.sl}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">AI Accuracy</span>
                            <span class="data-value">${details.accuracy}%</span>
                        </div>

                        <div class="ai-logic">
                            <strong>Logic:</strong> ${details.tech_logic}<br>
                            <strong>Risk:</strong> ${details.risk_logic}
                        </div>
                        
                        <div class="timestamp">
                            Updated: ${new Date(details.timestamp * 1000).toLocaleTimeString()}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            }
            
            // කාසි ඔක්කොම Expire වෙලා නම්, Default පණිවිඩයක් පෙන්වීම
            if(container.innerHTML === '') {
                 container.innerHTML = `
                    <div class="signal-card" style="text-align: center; grid-column: 1 / -1;">
                        <span class="badge badge-waiting">MARKET SCANNING ⏳</span>
                        <h2 class="side-neutral">Waiting for new setups...</h2>
                    </div>
                `;
            }
        }

        // Firebase එකෙන් සජීවීව දත්ත ලබා ගැනීම (Live Listener)
        const signalsRef = db.ref('live_signals');
        signalsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            renderSignals(data);
        });

        // සෑම තත්පර 30කට වරක්ම Expire වූ Scalp සිග්නල් මකා දැමීමට UI එක Refresh කිරීම
        setInterval(() => {
            signalsRef.once('value').then(snapshot => {
                renderSignals(snapshot.val());
            });
        }, 30000);

    </script>
</body>
</html>
