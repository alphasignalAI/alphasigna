<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSigna V18.8 - Ultimate Bubble Matrix</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #06090e;
            --card-bg: #0d1117;
            --accent: #ff007f;
            --long: #00e676;
            --short: #ff1744;
            --border: #21262d;
        }
        body {
            background-color: var(--bg-dark); color: #c9d1d9; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px;
            overflow-x: hidden;
        }
        
        /* 🚨 System Status */
        #status-bar {
            background: rgba(0, 255, 204, 0.1); border: 1px solid var(--primary);
            color: var(--primary); text-align: center; padding: 10px; border-radius: 8px;
            font-size: 13px; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .pulse-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* 🔑 Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 320px; }
        .login-box input { padding: 14px; width: 85%; border-radius: 8px; border: 1px solid var(--border); background: #010409; color: var(--primary); font-size: 16px; text-transform: uppercase; text-align: center; margin-bottom: 20px; outline: none; }
        
        .btn { background: var(--primary); color: #000; padding: 14px 28px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; width: 100%; }
        .btn:hover { box-shadow: 0 0 20px var(--primary); transform: translateY(-1px); }
        
        .btn-trade { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; padding: 11px; width: 48%; display: inline-block; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-trade:hover { background: var(--primary); color: #000; }
        .btn-chart { background: rgba(255, 0, 127, 0.05); border: 1px solid var(--accent); color: var(--accent); margin-top: 15px; padding: 11px; width: 48%; display: inline-block; float: right; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-chart:hover { background: var(--accent); color: #fff; box-shadow: 0 0 15px var(--accent); }

        #dashboard { display: none; max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #fff; margin-bottom: 5px; font-size: 28px; font-weight: 800; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 26px; font-weight: 700; color: #f0f6fc; }
        .global-card { border-left: 4px solid var(--primary); }
        .personal-card { border-left: 4px solid var(--accent); }

        /* 🫧 FORCE-DIRECTED BUBBLE MATRIX */
        .scanner-section { text-align: center; margin: 20px 0; position: relative; }
        #bubble-container { 
            display: none; width: 100%; height: 750px; margin: 0 auto 20px auto; 
            background: #010409; border-radius: 16px; border: 1px solid var(--border); 
            position: relative; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 204, 0.03) 0%, transparent 70%);
        }
        #scanner-status { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; font-family: monospace; font-size: 13px; color: var(--primary); font-weight: bold; z-index: 5; }

        /* Wrapper handles exact center positioning for physics */
        .bubble-wrapper {
            position: absolute;
            top: 0; left: 0;
            will-change: transform;
            z-index: 10;
        }
        .bubble-wrapper:hover {
            z-index: 100;
        }

        .crypto-bubble {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            cursor: pointer;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.25s ease;
            user-select: none;
        }
        
        .bubble-wrapper:hover .crypto-bubble {
            transform: scale(1.2);
            filter: brightness(1.3) drop-shadow(0 0 25px rgba(255,255,255,0.3));
        }
        
        .bubble-name { font-weight: 900; font-size: 15px; letter-spacing: 0.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .bubble-price { font-size: 11px; opacity: 0.95; margin-top: 3px; font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .bubble-percent { font-size: 13px; font-weight: 900; margin-top: 3px; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        /* Signals */
        .signal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 20px; opacity: 0; transition: opacity 0.5s ease; margin-top: 20px; }
        .signal-card { background: var(--card-bg); border-radius: 14px; padding: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
        .badge-swing { background: rgba(56, 139, 253, 0.15); color: #58a6ff; border: 1px solid rgba(56, 139, 253, 0.4); }
        .badge-scalp { background: rgba(242, 8c, 166, 0.15); color: #f25ca6; border: 1px solid rgba(242, 8c, 166, 0.4); }
        .coin-title { font-size: 24px; font-weight: 700; margin-bottom: 18px; display: flex; justify-content: space-between; color: #fff; }
        .side-long { color: var(--long); }
        .side-short { color: var(--short); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid rgba(33,38,45,0.5); padding-bottom: 6px; }
        
        /* 📈 Live Chart Popup */
        #chart-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(1, 4, 9, 0.96); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        .chart-container { width: 92%; max-width: 1050px; height: 75vh; background: #010409; border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; }
        .close-chart { position: absolute; top: 15px; right: 20px; color: #8b949e; font-size: 26px; cursor: pointer; background: none; border: none; }
        #tv-chart { width: 100%; height: calc(100% - 40px); margin-top: 15px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <div id="status-bar" style="display: none;">
        <div class="pulse-dot" id="status-dot"></div>
        <span id="status-text">HF ENGINE CORE: LOADING...</span>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #fff; margin-bottom: 5px; font-weight: 800;">ALPHASIGNA AI</h2>
            <p style="color: #8b949e; font-size: 13px; margin-bottom: 25px;">Global High-Frequency Terminal</p>
            <input type="password" id="access-key" placeholder="ENTER LICENSE KEY" />
            <br>
            <button class="btn" onclick="verifyFirebaseKey()">INITIALIZE MATRIX</button>
            <p id="error-msg" style="color: var(--short); display: none; margin-top: 15px; font-weight: 600;">⚠️ ACCESS DENIED</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>AlphaSigna Intelligence Hub</h1>
            <p id="user-welcome" style="color: var(--primary); font-size: 13px; font-weight: 700; margin: 0;"></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card global-card"><h3>Global Total Trades</h3><div class="stat-value" id="global-total-trades">0</div></div>
            <div class="stat-card global-card"><h3>Global Win Rate</h3><div class="stat-value" id="global-win-rate" style="color: var(--primary);">0%</div></div>
            <div class="stat-card personal-card"><h3>My Matrix Trades</h3><div class="stat-value" id="user-trades">0</div></div>
            <div class="stat-card personal-card"><h3>My Target Performance</h3><div class="stat-value" id="user-pnl-ratio" style="color: var(--long);">0 / 0</div></div>
        </div>

        <div class="scanner-section">
            <div id="bubble-container">
                <div id="scanner-status">FETCHING LIVE BINANCE DATA & ASSEMBLING BUBBLES...</div>
            </div>
            <button class="btn" id="scan-btn" style="width: auto; padding: 12px 30px;" onclick="startBubbleScan()">🛰️ SCAN REAL-TIME ORDERBOOK</button>
        </div>

        <div class="signal-grid" id="signal-container"></div>
    </div>

    <div id="chart-modal">
        <div class="chart-container">
            <button class="close-chart" onclick="closeLiveChart()">✖</button>
            <div class="chart-header">
                <span class="chart-title" id="chart-coin-name" style="color: #fff; font-size: 20px; font-weight: bold;">BTC/USDT</span>
                <span id="chart-side" class="badge badge-swing">1 MONTH VIEW</span>
            </div>
            <div id="tv-chart"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://alphasigna-live-d644a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentSignalData = null;
        let activeUserKey = null;
        let bubblesArray = [];
        let physicsInterval;

        db.ref('system_status').on('value', (s) => {
            const status = s.val();
            if(status) {
                document.getElementById('status-bar').style.display = 'flex';
                document.getElementById('status-text').innerText = `SYSTEM STATUS: ${status.message.toUpperCase()}`;
            }
        });

        function verifyFirebaseKey() {
            const inputKey = document.getElementById('access-key').value.trim();
            if(!inputKey) return;
            db.ref('premium_keys/' + inputKey).once('value', (s) => {
                const userData = s.val();
                if (userData && userData.status === "active") {
                    activeUserKey = inputKey;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('user-welcome').innerText = `LICENSE USER: ${inputKey.toUpperCase()}`;
                    initCoreListeners();
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }

        function initCoreListeners() {
            db.ref('live_signals').on('value', (s) => { currentSignalData = s.val(); if(document.getElementById('signal-container').style.opacity === "1") renderSignals(currentSignalData); });
        }

        function takeTrade(coin) {
            alert(`⚡ TRADE COMMAND INTEGRATED for ${coin}.`);
        }

        // --- 🫧 PHYSICS ENGINE (GRAVITY + COLLISION) ---
        async function startBubbleScan() {
            document.getElementById('scan-btn').style.display = 'none';
            const container = document.getElementById('bubble-container');
            const grid = document.getElementById('signal-container');
            const statusText = document.getElementById('scanner-status');
            
            container.style.display = 'block';
            grid.style.opacity = '0';
            
            document.querySelectorAll('.bubble-wrapper').forEach(e => e.remove());
            clearInterval(physicsInterval);
            bubblesArray = [];

            try {
                // Fetch real 24hr data from Binance API
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await response.json();
                
                // Get TOP 80 active pairs for a massive filled look!
                const usdtPairs = data.filter(c => c.symbol.endsWith('USDT') && parseFloat(c.volume) > 5000000);
                usdtPairs.sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));
                const topCoins = usdtPairs.slice(0, 80); 

                const contWidth = container.clientWidth;
                const contHeight = container.clientHeight;
                const centerX = contWidth / 2;
                const centerY = contHeight / 2;

                topCoins.forEach((coin, index) => {
                    const priceChange = parseFloat(coin.priceChangePercent);
                    const isPositive = priceChange >= 0;
                    
                    // Bubble sizing mechanics
                    const absChange = Math.abs(priceChange);
                    const size = Math.max(50, Math.min(140, 45 + (absChange * 4.5))); // Radius = size/2
                    const radius = size / 2;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'bubble-wrapper';
                    wrapper.style.width = `${size}px`;
                    wrapper.style.height = `${size}px`;

                    const bubble = document.createElement('div');
                    bubble.className = 'crypto-bubble';
                    
                    // CryptoBubble specific styling (shiny gradients)
                    if (isPositive) {
                        bubble.style.background = 'radial-gradient(circle at 35% 35%, #00e676, #00994d, #004d26)';
                        bubble.style.border = '2px solid #00ffcc';
                    } else {
                        bubble.style.background = 'radial-gradient(circle at 35% 35%, #ff1744, #b30021, #660012)';
                        bubble.style.border = '2px solid #ff4d6d';
                    }

                    const name = coin.symbol.replace('USDT', '');
                    let displayPrice = parseFloat(coin.lastPrice);
                    displayPrice = displayPrice < 1 ? displayPrice.toFixed(4) : displayPrice.toFixed(2);
                    
                    // Scale text size based on bubble size
                    const nameSize = size > 90 ? '18px' : (size > 60 ? '14px' : '10px');
                    const priceSize = size > 90 ? '13px' : (size > 60 ? '11px' : '9px');
                    const percentSize = size > 90 ? '14px' : (size > 60 ? '12px' : '10px');

                    bubble.innerHTML = `
                        <span class="bubble-name" style="font-size:${nameSize}">${name}</span>
                        <span class="bubble-price" style="font-size:${priceSize}">$${displayPrice}</span>
                        <span class="bubble-percent" style="font-size:${percentSize}">${isPositive ? '+' : ''}${priceChange.toFixed(1)}%</span>
                    `;

                    wrapper.appendChild(bubble);
                    container.appendChild(wrapper);

                    // Physics State Initialization (Spawn randomly around center)
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 200;
                    
                    let bData = {
                        wrapper: wrapper,
                        x: centerX + Math.cos(angle) * dist,
                        y: centerY + Math.sin(angle) * dist,
                        vx: (Math.random() - 0.5) * 5,
                        vy: (Math.random() - 0.5) * 5,
                        radius: radius,
                        size: size,
                        isHovered: false
                    };
                    bubblesArray.push(bData);

                    // Stop physics forces on this bubble when hovered
                    wrapper.onmouseenter = () => bData.isHovered = true;
                    wrapper.onmouseleave = () => bData.isHovered = false;

                    bubble.onclick = () => openBubbleChart(coin.symbol, name);
                });

                statusText.innerText = "🟢 GLOBAL MATRIX ACTIVE. DRIVEN BY FORCE-DIRECTED PHYSICS.";
                
                setTimeout(() => {
                    renderSignals(currentSignalData);
                    grid.style.opacity = '1';
                }, 3000);

                // --- ⚙️ ADVANCED 2D PHYSICS LOOP ---
                physicsInterval = setInterval(() => {
                    // Constant weak gravity pulling all towards the exact center
                    const gravityStr = 0.003;
                    const dampening = 0.90; // Friction

                    // Apply forces
                    bubblesArray.forEach((b, i) => {
                        if (!b.isHovered) {
                            // Gravity
                            b.vx += (centerX - b.x) * gravityStr;
                            b.vy += (centerY - b.y) * gravityStr;

                            // Add a tiny random force so they constantly jiggle/float around like live bubbles
                            b.vx += (Math.random() - 0.5) * 0.2;
                            b.vy += (Math.random() - 0.5) * 0.2;
                        }

                        // Collision with other bubbles (Circle packing)
                        for (let j = i + 1; j < bubblesArray.length; j++) {
                            let b2 = bubblesArray[j];
                            let dx = b.x - b2.x;
                            let dy = b.y - b2.y;
                            let distance = Math.sqrt(dx * dx + dy * dy);
                            let minDistance = b.radius + b2.radius + 2; // +2px padding

                            if (distance < minDistance) {
                                // They are colliding, push them apart
                                let overlap = minDistance - distance;
                                let nx = dx / distance;
                                let ny = dy / distance;
                                
                                // Push ratio based on mass (radius) could be done, but equal push is fine
                                let pushX = nx * overlap * 0.5;
                                let pushY = ny * overlap * 0.5;

                                if(!b.isHovered) { b.x += pushX; b.y += pushY; }
                                if(!b2.isHovered) { b2.x -= pushX; b2.y -= pushY; }
                                
                                // Dampen collision velocity
                                b.vx *= 0.8; b.vy *= 0.8;
                                b2.vx *= 0.8; b2.vy *= 0.8;
                            }
                        }

                        // Keep them inside the container box limits
                        if (b.x - b.radius < 0) { b.x = b.radius; b.vx *= -1; }
                        if (b.x + b.radius > contWidth) { b.x = contWidth - b.radius; b.vx *= -1; }
                        if (b.y - b.radius < 0) { b.y = b.radius; b.vy *= -1; }
                        if (b.y + b.radius > contHeight) { b.y = contHeight - b.radius; b.vy *= -1; }

                        // Apply friction and update position
                        b.vx *= dampening;
                        b.vy *= dampening;
                        
                        if(!b.isHovered){
                            b.x += b.vx;
                            b.y += b.vy;
                        }

                        // Translate takes top-left corner, so subtract radius to center the transform
                        b.wrapper.style.transform = `translate(${b.x - b.radius}px, ${b.y - b.radius}px)`;
                    });
                }, 16); // ~60 FPS

            } catch(e) {
                statusText.innerText = "⚠️ ERROR FETCHING BINANCE DATA.";
                console.error(e);
            }
        }

        // --- 📈 CLICK TO OPEN 1-MONTH CHART (TRADINGVIEW) ---
        function openBubbleChart(symbol, name) {
            document.getElementById('chart-modal').style.display = 'flex';
            document.getElementById('chart-coin-name').innerText = `${name}/USDT - 1 Month Analysis`;
            document.getElementById('chart-side').innerText = "DAILY TIMEFRAME";

            const chartDiv = document.getElementById('tv-chart');
            chartDiv.innerHTML = '';
            const tvSymbol = "BINANCE:" + symbol;

            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": tvSymbol, "interval": "D",
                "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en",
                "toolbar_bg": "#010409", "enable_publishing": false, "hide_side_toolbar": false,
                "allow_symbol_change": false, "container_id": "tv-chart", "studies": [],
                "backgroundColor": "#010409", "gridColor": "rgba(33, 38, 45, 0.4)"
            });
        }

        function closeLiveChart() {
            document.getElementById('chart-modal').style.display = 'none';
            document.getElementById('tv-chart').innerHTML = '';
        }

        function renderSignals(data) {
            const container = document.getElementById('signal-container');
            container.innerHTML = ''; if (!data) return;

            if (data.WAITING) {
                container.innerHTML = `<div class="signal-card" style="text-align: center; grid-column: 1 / -1; padding: 50px;"><h2 style="color: #fff;">Scanning Global High-Frequency Liquidity...</h2></div>`;
                return;
            }

            const currentTime = Math.floor(Date.now() / 1000);
            for (const [coin, details] of Object.entries(data)) {
                if (details.signal_type.includes("SCALP") && (currentTime - details.timestamp) > 900) continue; 
                let badgeClass = details.signal_type.includes("SWING") ? "badge-swing" : "badge-scalp";
                let sideClass = details.side === "LONG" ? "side-long" : "side-short";

                container.innerHTML += `
                    <div class="signal-card">
                        <div>
                            <span class="badge ${badgeClass}">${details.signal_type}</span>
                            <div class="coin-title"><span>${details.pair}</span><span class="${sideClass}">${details.side}</span></div>
                            <div class="data-row"><span class="data-label">Target Entry</span><span class="data-value">${details.entry}</span></div>
                            <div class="data-row"><span class="data-label">Take Profit</span><span class="data-value" style="color: #00e676;">${details.tp1}</span></div>
                            <div class="data-row"><span class="data-label">Stop Loss</span><span class="data-value" style="color: #ff1744;">${details.sl}</span></div>
                        </div>
                        <div>
                            <button class="btn btn-trade" onclick="takeTrade('${coin}')">⚡ TAKE TRADE</button>
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
