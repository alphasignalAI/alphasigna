<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenithAI V35.0 - VIP Alert Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --primary: #ff007f;      
            --accent: #00f0ff;       
            --violet-glow: #dd00ff;
            --bg-dark: #090206;      
            --card-bg: rgba(20, 4, 16, 0.8); 
            --card-border: rgba(255, 0, 127, 0.25);
            --long: #00ffaa;
            --short: #ff1744;
            --btc-gold: #f7931a;
            --text-main: #f8fafc;
            --text-muted: #9ca3af;
        }

        body { 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 127, 0.08), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(221, 0, 255, 0.06), transparent 30%);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden; 
        }
        
        h1, h2, h3 { font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; margin: 0; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .btn { 
            background: linear-gradient(90deg, var(--primary), var(--violet-glow));
            color: #fff; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
        }
        .btn:hover { box-shadow: 0 0 25px rgba(255, 0, 127, 0.6); transform: translateY(-2px); }

        #login-screen, #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .auth-box { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .auth-box input[type="text"], .auth-box input[type="password"] { 
            width: 100%; box-sizing: border-box; padding: 15px; border-radius: 12px; 
            border: 1px solid var(--card-border); background: rgba(0,0,0,0.6); 
            color: var(--primary); font-size: 16px; text-align: center; margin-bottom: 20px; 
            outline: none; transition: 0.3s;
        }

        #dashboard { display: none; max-width: 1600px; margin: 0 auto; padding-top: 10px; }
        
        .dashboard-layout {
            display: grid;
            grid-template-columns: 53% 47%;
            gap: 25px;
            align-items: stretch;
        }

        @media (max-width: 1100px) {
            .dashboard-layout { grid-template-columns: 1fr; align-items: start; }
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .top-nav h1 { font-size: 32px; background: -webkit-linear-gradient(0deg, var(--primary), var(--violet-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-actions { display: flex; align-items: center; gap: 20px; }
        .user-profile { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .profile-circle {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255, 0, 127, 0.15); border: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: var(--primary);
        }

        .left-col { display: flex; flex-direction: column; gap: 20px; height: 100%; justify-content: space-between; }
        
        #network-container { 
            width: 100%; height: 430px; 
            border-radius: 20px; position: relative; overflow: hidden; 
            background: #090206; border: 1px solid var(--card-border);
        }
        #scanner-status { font-family: 'Rajdhani', monospace; font-size: 15px; color: var(--primary); font-weight: bold; padding: 12px 15px; background: rgba(0,0,0,0.8); position: absolute; top: 0; z-index: 10; width: 100%; box-sizing: border-box; border-bottom: 1px solid var(--card-border); }

        .ask-ai-panel {
            padding: 25px;
            background: linear-gradient(145deg, rgba(255,0,127,0.03), rgba(21,5,20,0.95));
            border-left: 4px solid var(--violet-glow);
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { 
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(221, 0, 255, 0.2);
            border-radius: 14px; padding: 12px; text-align: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            min-height: 105px; box-sizing: border-box;
        }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .stat-val { font-size: 20px; font-weight: 800; font-family: 'Rajdhani', sans-serif; color: #fff; }
        
        .mini-trendline { width: 100%; height: 20px; display: flex; align-items: flex-end; gap: 3px; }
        .trend-bar { flex-grow: 1; background: var(--violet-glow); opacity: 0.7; height: 40%; }
        
        .matrix-sub-layout { display: grid; grid-template-columns: 180px 1fr; gap: 20px; }
        
        #radar-section {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(221, 0, 255, 0.2);
            border-radius: 16px; padding: 15px 10px; text-align: center;
        }
        .radar-scope {
            position: relative; width: 100px; height: 100px; border-radius: 50%;
            border: 2px dashed rgba(221, 0, 255, 0.4); display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
        }
        .radar-sweep {
            position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(221, 0, 255, 0.4) 0%, transparent 70%);
            transform-origin: bottom right; top: 0; left: 0; border-radius: 100% 0 0 0;
            animation: radarRotate 2s linear infinite;
        }
        @keyframes radarRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #heartbeat-canvas { width: 140px; height: 35px; background: rgba(10, 2, 8, 0.6); margin-bottom: 15px; border-radius: 6px; }

        .adv-modules-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        /* WHALE TRACKER DYNAMIC CARD STYLING */
        .module-card { 
            background: rgba(0,0,0,0.4); border: 1px dashed rgba(221, 0, 255, 0.2); 
            padding: 10px; border-radius: 12px; font-size: 11px; text-align: center; 
            transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: center;
        }
        #whale-data { transition: 0.3s ease; }

        .right-col { display: flex; flex-direction: column; height: 100%; justify-content: flex-start; }
        .signal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; }
        
        .signal-card { 
            background: var(--card-bg); border-radius: 16px; padding: 20px; 
            border: 1px solid rgba(221, 0, 255, 0.25); display: flex; flex-direction: column; 
            justify-content: space-between; min-height: 290px; box-sizing: border-box;
            transition: 0.3s ease;
        }
        .signal-card:hover { border-color: var(--primary); box-shadow: 0 8px 25px rgba(255, 0, 127, 0.25); }
        
        .coin-title { font-size: 22px; font-weight: 800; display: flex; justify-content: space-between; color: #fff; margin-bottom: 15px; }
        .side-long { color: #000; background: var(--long); padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold;}
        .side-short { color: #000; background: var(--short); padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold;}
        
        .data-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .data-label { color: var(--text-muted); }
        .data-value { color: #fff; font-weight: bold; }

        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-trade { grid-column: span 2; background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 12px; }
        .btn-trade:hover { background: var(--primary); color: #fff; box-shadow: 0 0 15px var(--primary); }
        .btn-mini { background: rgba(255,255,255,0.04); border: 1px solid rgba(221, 0, 255, 0.2); color: #fff; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; text-align: center; }
        .btn-mini:hover { border-color: var(--primary); background: rgba(255,0,127,0.1); }

        #ui-notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .ui-toast { background: rgba(15, 2, 10, 0.95); border: 1px solid var(--primary); padding: 12px 20px; border-radius: 12px; color: #fff; font-size: 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 15px rgba(255,0,127,0.4); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="ui-notification-container"></div>

    <div id="login-screen">
        <div class="glass-panel auth-box">
            <h2>ZENITHAI TERMINAL</h2>
            <input type="password" id="access-key" placeholder="Enter License Key" />
            <button class="btn" onclick="verifyFirebaseKey()">INITIALIZE MATRIX</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="top-nav">
            <div>
                <h1>ZenithAI Matrix</h1>
            </div>
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="profile-circle">U</div>
                </div>
            </div>
        </div>

        <div class="dashboard-layout">
            <div class="left-col">
                <div class="glass-panel" style="overflow: hidden; position: relative; height: 430px;">
                    <div id="scanner-status">🟢 RADAR ACTIVE & STREAMING LIVE MARKET DATA</div>
                    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT.P&interval=15&theme=dark" style="width: 100%; height: 100%; border: none; margin-top: 38px;"></iframe>
                </div>

                <div class="glass-panel ask-ai-panel">
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-label">Global Trades</div><div class="stat-val" id="global-trades">0</div></div>
                        <div class="stat-item"><div class="stat-label">Win Rate</div><div class="stat-val" id="global-win">0%</div></div>
                        <div class="stat-item"><div class="stat-label">My Trades</div><div class="stat-val">0</div></div>
                        <div class="stat-item"><div class="stat-label">P&L Status</div><div class="stat-val" style="color:var(--long);">Stable</div></div>
                    </div>
                    
                    <div class="matrix-sub-layout">
                        <div id="radar-section">
                            <div class="radar-scope"><div class="radar-sweep"></div></div>
                            <canvas id="heartbeat-canvas"></canvas>
                            <button class="btn" style="font-size:11px; padding:8px;" onclick="revealSignals()">Scan Matrix</button>
                        </div>
                        <div class="adv-modules-grid">
                            <div class="module-card active-phase" id="mod-whale">
                                <span style="font-weight: bold; color: #fff;">🐋 Whale Inflows</span>
                                <span id="whale-data" style="color:var(--primary); font-size: 14px; font-weight: 800; font-family:'Rajdhani', sans-serif; margin-top:5px; text-shadow: 0 0 10px rgba(255,0,127,0.5);">AWAITING DATA...</span>
                            </div>
                            
                            <div class="module-card">🔥 Liquidity Maps <span style="color:var(--text-muted); display:block; margin-top:5px;">Standby</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="signal-grid" id="signal-container"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://alphasigna-live-d644a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function verifyFirebaseKey() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initLiveTracker();
            initHeartbeatPulse();
            initWhaleTracker(); // Initialize Whale Data Stream
        }

        function initHeartbeatPulse() {
            const canvas = document.getElementById('heartbeat-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let x = 0;
            ctx.strokeStyle = '#ff007f'; ctx.lineWidth = 2;
            function draw() {
                if(x > canvas.width){ x=0; ctx.clearRect(0,0,canvas.width,canvas.height); }
                ctx.beginPath(); ctx.moveTo(x, canvas.height/2);
                x+=2; let y = canvas.height/2;
                if(x%40===0) y-=12; else if(x%40===4) y+=12;
                ctx.lineTo(x,y); ctx.stroke();
                requestAnimationFrame(draw);
            }
            draw();
        }

        // ==========================================
        // NEW: Live Whale Tracker Dynamic UI Hook
        // ==========================================
        function initWhaleTracker() {
            // Listen to the last added whale trade from Firebase
            db.ref('whale_tracker').limitToLast(1).on('child_added', (snap) => {
                const data = snap.val();
                if(!data) return;
                
                const whaleContainer = document.getElementById('whale-data');
                const card = document.getElementById('mod-whale');
                
                // Determine color based on BUY or SELL
                const actionColor = data.side === "BUY" ? "var(--long)" : "var(--short)";
                
                // Update Box Text
                whaleContainer.innerHTML = `<span style="color:${actionColor};">${data.side}</span> ${data.coin.replace('/USDT', '')} <br/> <span style="font-size:16px;">${data.value}</span>`;
                whaleContainer.style.textShadow = `0 0 10px ${actionColor}`;
                
                // Create a Flash Visual Effect
                card.style.borderColor = actionColor;
                card.style.boxShadow = `0 0 15px ${actionColor} inset, 0 0 15px ${actionColor}`;
                
                // Reset visual effect after 1 second
                setTimeout(() => {
                    card.style.borderColor = "rgba(221, 0, 255, 0.2)";
                    card.style.boxShadow = "none";
                }, 1000);
            });
        }

        function initLiveTracker() {
            db.ref('live_signals').on('value', (snap) => {
                renderSignals(snap.val());
            });
        }

        function renderSignals(data) {
            const container = document.getElementById('signal-container');
            container.innerHTML = '';
            if(!data) return;
            for(const [key, val] of Object.entries(data)) {
                let sideClass = val.side === "LONG" ? "side-long" : "side-short";
                container.innerHTML += `
                    <div class="signal-card">
                        <div>
                            <div class="coin-title"><span>${val.pair || key}</span><span class="${sideClass}">${val.side}</span></div>
                            <div class="data-row"><span class="data-label">Entry Price</span><span class="data-value">${val.entry}</span></div>
                            <div class="data-row"><span class="data-label">TP Target</span><span class="data-value" style="color:var(--long)">${val.tp1}</span></div>
                            <div class="data-row"><span class="data-label">Stop Loss</span><span class="data-value" style="color:var(--short)">${val.sl}</span></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-trade">AUTO-TRADE API</button>
                            <button class="btn-mini" onclick="window.open('https://www.binance.com/en/futures/${val.pair || key}', '_blank')"><i class="fas fa-chart-line"></i> Live Market</button>
                            <button class="btn-mini" onclick="alert('Logic Mode: Institutional Scalp AI Strategy Enabled')"><i class="fas fa-cog"></i> Logic Config</button>
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
